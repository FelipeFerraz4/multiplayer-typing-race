<div class="container">
    <h1>Corrida de Digitação</h1>

    <input type="text" placeholder="Seu nome" [(ngModel)]="name" [disabled]="isLoading" />

    <button (click)="createRoom()" [disabled]="isLoading">
        {{ isLoading ? 'Criando...' : 'Criar Sala' }}
    </button>
    
    <button (click)="openModal()" [disabled]="isLoading">Entrar em uma sala</button>
</div>

<div class="modal-overlay" *ngIf="showModal">
    <div class="modal">
        <h2>Entrar na Sala</h2>

        <p>Olá, <strong>{{ name }}</strong>! Digite o código da sala:</p>
        <input type="text" placeholder="Ex: 8D109B" [(ngModel)]="roomId" style="text-transform: uppercase;" />

        <div class="modal-actions">
            <button class="cancel" (click)="closeModal()">Cancelar</button>
            <button class="confirm" (click)="confirmJoin()">Entrar</button>
        </div>
    </div>
</div>
