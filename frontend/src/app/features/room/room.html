<div class="room-container">

    <div *ngIf="loading">
        Carregando sala...
    </div>

    <!-- Header da Sala -->
    <div class="room-header" *ngIf="!loading">
        <h1>Sala de Corrida 🏁</h1>

        <div class="room-code">
            <span>ID da Sala:</span>
            <strong>{{ room?.room_code }}</strong>
            <button (click)="copyRoomId()">Copiar</button>
        </div>
    </div>

    <!-- Lista de Jogadores -->
    <div class="players-section" *ngIf="!loading">
        <h2>Jogadores na Sala</h2>

        <div class="players-grid">
            <div class="player-card" 
                *ngFor="let player of players" 
                [class.host]="player.is_host"
                [class.is-me]="player.id === currentUserId"> <div class="avatar">
                    <img [src]="avatarMap.get(player.avatar_id)?.url" [alt]="avatarMap.get(player.avatar_id)?.name" />
                </div>

                <div class="player-info">
                    <span class="name">
                        {{ player.name }} {{ player.id === currentUserId ? '(Você)' : '' }}
                    </span>
                    <span class="role" *ngIf="player.is_host">Host 👑</span>
                </div>

            </div>
        </div>
    </div>

    <!-- Ações -->
    <div class="room-actions" *ngIf="!loading">
        <button class="start-btn" *ngIf="is_host" (click)="startGame()">
            Iniciar Corrida 🚀
        </button>

        <p *ngIf="!is_host" class="waiting-text">
            Aguardando o host iniciar a corrida...
        </p>
    </div>

</div>
